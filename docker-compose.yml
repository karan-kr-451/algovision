services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: algovision
      POSTGRES_PASSWORD: algovision
      POSTGRES_DB: algovision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algovision"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  problem-service:
    build: ./services/problem-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
