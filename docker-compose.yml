services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: algovision
      POSTGRES_PASSWORD: algovision
      POSTGRES_DB: algovision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algovision"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  problem-service:
    build: ./services/problem-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
    depends_on:
      postgres:
        condition: service_healthy

  judge-service:
    build: ./services/judge-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
    volumes:
      # docker-outside-of-docker: launches sandboxed run containers on the HOST daemon
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  recommendation-service:
    build: ./services/recommendation-service
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://algovision:algovision@postgres:5432/algovision
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  trace-execution-service:
    build: ./services/trace-execution-service
    ports:
      - "8004:8004"
    environment:
      REDIS_URL: redis://redis:6379/0
      TRACE_RUNNER_IMAGE: algovision-trace-runner:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  visualization-engine:
    build: ./services/visualization-engine
    ports:
      - "8005:8005"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
